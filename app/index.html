<html>
<head>
    <script src="/store.js"></script>
</head>
<body>
    <h2>Store Site</h2>
    <div id="user-info">Not logged in</div>
    <hr>

    <!-- AUTH -->
    <div>
        <h3>Login</h3>
        <label>Email:</label><br>
        <input type="email" id="email"><br>
        <label>Password:</label><br>
        <input type="password" id="password"><br><br>
        <input type="button" value="Login" onclick="login();">
        <input type="button" value="Logout" onclick="logout();">
    </div>
    <hr>

    <!-- REGISTER -->
    <div>
        <h3>Register</h3>
        <label>Name:</label><br>
        <input type="text" id="name"><br>
        <label>Email:</label><br>
        <input type="email" id="reg-email"><br>
        <label>Password:</label><br>
        <input type="password" id="reg-password"><br><br>
        <input type="button" value="Register" onclick="register();">
    </div>
    <hr>

    <!-- ACCOUNTS -->
    <div>
        <h3>Accounts</h3>
        <input type="button" value="Load Accounts" onclick="loadAccounts();">
        <ul id="accountList"></ul>
    </div>
    <hr>

    <!-- PRODUCTS -->
    <div>
        <h3>Products</h3>
        <label>Name:</label><br>
        <input type="text" id="product-name"><br>
        <label>Price:</label><br>
        <input type="number" id="product-price" step="0.01"><br>
        <label>Stock:</label><br>
        <input type="number" id="product-stock"><br><br>
        <input type="button" value="Create Product" onclick="createProduct();">
        <input type="button" value="Load Products" onclick="loadProducts();">
        <ul id="productList"></ul>
    </div>
    <hr>

    <!-- ORDERS -->
    <div>
        <h3>Orders</h3>
        <label>Product ID:</label><br>
        <input type="text" id="order-product-id"><br>
        <label>Quantity:</label><br>
        <input type="number" id="order-quantity"><br><br>
        <input type="button" value="Create Order" onclick="createOrder();">
        <input type="button" value="Load Orders" onclick="loadOrders();">
        <ul id="orderList"></ul>
    </div>
    <hr>

    <!-- EXCHANGE -->
    <div>
        <h3>Exchange</h3>
        <label>From:</label><br>
        <input type="text" id="from-currency" placeholder="USD"><br>
        <label>To:</label><br>
        <input type="text" id="to-currency" placeholder="BRL"><br><br>
        <input type="button" value="Get Rate" onclick="getExchangeRate();">
        <pre id="exchangeResult"></pre>
    </div>

    <script>
        whoiam();
    </script>
</body>
</html>
